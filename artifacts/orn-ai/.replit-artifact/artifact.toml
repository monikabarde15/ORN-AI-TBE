kind = "web"
previewPath = "/"
title = "ORN-AI Talent Infrastructure Platform"
version = "1.0.0"
id = "artifacts/orn-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22745

[services.development]
run = "pnpm --filter @workspace/orn-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orn-ai", "run", "build" ]
publicDir = "artifacts/orn-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22745"
BASE_PATH = "/"
