openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ORN-AI Talent Infrastructure Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Candidate registration and lifecycle
  - name: evaluation
    description: AI CV evaluation and scoring
  - name: recruiter
    description: Recruiter dashboard endpoints
  - name: admin
    description: Admin dashboard endpoints
  - name: meta
    description: Reference data (countries, roles, levels)
  - name: training
    description: Career-transformation workflow (Upskilling / Reskilling → Recruiter Ready)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /meta/regions:
    get:
      operationId: listRegions
      tags: [meta]
      summary: List supported countries grouped by phase
      responses:
        "200":
          description: Regions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionList"

  /meta/roles:
    get:
      operationId: listRoles
      tags: [meta]
      summary: List target roles available
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates with filters (recruiter/admin view)
      parameters:
        - name: country
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string }
        - name: experienceMin
          in: query
          schema: { type: integer }
        - name: experienceMax
          in: query
          schema: { type: integer }
        - name: englishLevel
          in: query
          schema: { type: string }
        - name: minReadiness
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

    post:
      operationId: registerCandidate
      tags: [candidates]
      summary: Register a new candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateRegistration"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}/cv:
    post:
      operationId: uploadCv
      tags: [candidates]
      summary: Attach CV metadata to a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CvUpload"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}/evaluation:
    post:
      operationId: runEvaluation
      tags: [evaluation]
      summary: Run AI evaluation against a candidate's CV
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
    get:
      operationId: getEvaluation
      tags: [evaluation]
      summary: Get the latest evaluation for a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"

  /recruiter/summary:
    get:
      operationId: recruiterSummary
      tags: [recruiter]
      summary: Headline metrics for the recruiter dashboard
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterSummary"

  /admin/pipeline:
    get:
      operationId: adminPipeline
      tags: [admin]
      summary: Talent pipeline aggregates by country, skill, readiness, and upskilling
      responses:
        "200":
          description: Pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPipeline"

  /admin/activity:
    get:
      operationId: adminActivity
      tags: [admin]
      summary: Recent platform activity feed
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /demo/seed:
    post:
      operationId: runDemoJourney
      tags: [admin]
      summary: Generate a fresh demo candidate journey for investor presentation
      responses:
        "200":
          description: Demo journey result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoJourney"

  /training/catalog:
    get:
      operationId: listTrainingCatalog
      tags: [training]
      summary: Available training programs and trainers
      responses:
        "200":
          description: Catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingCatalog"

  /training/dashboard:
    get:
      operationId: trainingDashboard
      tags: [training]
      summary: Admin training dashboard aggregates
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDashboard"

  /training/assignments:
    get:
      operationId: listTrainingAssignments
      tags: [training]
      summary: List training assignments (admin view)
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/TrainingStatus" }
        - name: trainingType
          in: query
          schema: { $ref: "#/components/schemas/TrainingType" }
        - name: trainerId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingAssignment"
    post:
      operationId: createTrainingAssignment
      tags: [training]
      summary: Assign a training program to a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingAssignmentCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignment"

  /training/assignments/{id}:
    get:
      operationId: getTrainingAssignment
      tags: [training]
      summary: Get a single training assignment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignment"
    patch:
      operationId: updateTrainingAssignment
      tags: [training]
      summary: Update training progress / status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingAssignmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignment"

  /candidates/{id}/training:
    get:
      operationId: getCandidateTraining
      tags: [training]
      summary: Get the active training assignment for a candidate (or null)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Training assignment or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TrainingAssignment"
                  - type: "null"

  /training/recommend/{candidateId}:
    get:
      operationId: recommendTrainingForCandidate
      tags: [training]
      summary: Suggest a recommended program for a candidate based on their evaluation
      parameters:
        - name: candidateId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRecommendation"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Region:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        phase: { type: integer }
        flag: { type: string }
      required: [code, name, phase, flag]

    RegionList:
      type: object
      properties:
        phase1:
          type: array
          items: { $ref: "#/components/schemas/Region" }
        phase2:
          type: array
          items: { $ref: "#/components/schemas/Region" }
      required: [phase1, phase2]

    EnglishLevel:
      type: string
      enum: [A1, A2, B1, B2, C1, C2]

    VisaStatus:
      type: string
      enum: [eu_citizen, work_permit, blue_card, requires_sponsorship, student_visa]

    CandidateRegistration:
      type: object
      properties:
        fullName: { type: string, minLength: 2 }
        email: { type: string, format: email }
        phone: { type: string }
        country: { type: string }
        targetRole: { type: string }
        yearsExperience: { type: integer, minimum: 0, maximum: 50 }
        visaStatus: { $ref: "#/components/schemas/VisaStatus" }
        englishLevel: { $ref: "#/components/schemas/EnglishLevel" }
        euWorkEligible: { type: boolean }
        linkedinUrl: { type: string }
        skills:
          type: array
          items: { type: string }
      required:
        - fullName
        - email
        - phone
        - country
        - targetRole
        - yearsExperience
        - visaStatus
        - englishLevel
        - euWorkEligible
        - linkedinUrl

    CvUpload:
      type: object
      properties:
        fileName: { type: string }
        fileSize: { type: integer }
        contentSummary: { type: string }
      required: [fileName, fileSize]

    EvaluationScores:
      type: object
      properties:
        cvQuality: { type: integer, minimum: 0, maximum: 100 }
        technicalSkillMatch: { type: integer, minimum: 0, maximum: 100 }
        englishReadiness: { type: integer, minimum: 0, maximum: 100 }
        europeJobReadiness: { type: integer, minimum: 0, maximum: 100 }
        upskillingNeeds: { type: integer, minimum: 0, maximum: 100 }
        overall: { type: integer, minimum: 0, maximum: 100 }
      required:
        - cvQuality
        - technicalSkillMatch
        - englishReadiness
        - europeJobReadiness
        - upskillingNeeds
        - overall

    EvaluationInsight:
      type: object
      properties:
        title: { type: string }
        detail: { type: string }
        severity: { type: string, enum: [strength, opportunity, gap] }
      required: [title, detail, severity]

    Evaluation:
      type: object
      properties:
        candidateId: { type: string }
        evaluatedAt: { type: string, format: date-time }
        scores: { $ref: "#/components/schemas/EvaluationScores" }
        strengths:
          type: array
          items: { type: string }
        gaps:
          type: array
          items: { type: string }
        recommendedUpskilling:
          type: array
          items: { type: string }
        insights:
          type: array
          items: { $ref: "#/components/schemas/EvaluationInsight" }
        readinessTier: { type: string, enum: [emerging, developing, ready, elite] }
      required:
        - candidateId
        - evaluatedAt
        - scores
        - strengths
        - gaps
        - recommendedUpskilling
        - insights
        - readinessTier

    Candidate:
      type: object
      properties:
        id: { type: string }
        fullName: { type: string }
        email: { type: string }
        phone: { type: string }
        country: { type: string }
        targetRole: { type: string }
        yearsExperience: { type: integer }
        visaStatus: { $ref: "#/components/schemas/VisaStatus" }
        englishLevel: { $ref: "#/components/schemas/EnglishLevel" }
        euWorkEligible: { type: boolean }
        linkedinUrl: { type: string }
        createdAt: { type: string, format: date-time }
        cv:
          oneOf:
            - $ref: "#/components/schemas/CvUpload"
            - type: "null"
        evaluation:
          oneOf:
            - $ref: "#/components/schemas/Evaluation"
            - type: "null"
        skills:
          type: array
          items: { type: string }
        avatarUrl: { type: string }
      required:
        - id
        - fullName
        - email
        - phone
        - country
        - targetRole
        - yearsExperience
        - visaStatus
        - englishLevel
        - euWorkEligible
        - linkedinUrl
        - createdAt
        - skills
        - avatarUrl

    RecruiterSummary:
      type: object
      properties:
        totalCandidates: { type: integer }
        readyCandidates: { type: integer }
        newThisWeek: { type: integer }
        avgReadiness: { type: integer }
        countryBreakdown:
          type: array
          items:
            type: object
            properties:
              country: { type: string }
              count: { type: integer }
              avgReadiness: { type: integer }
            required: [country, count, avgReadiness]
        topRoles:
          type: array
          items:
            type: object
            properties:
              role: { type: string }
              count: { type: integer }
            required: [role, count]
      required:
        - totalCandidates
        - readyCandidates
        - newThisWeek
        - avgReadiness
        - countryBreakdown
        - topRoles

    AdminPipeline:
      type: object
      properties:
        totalCandidates: { type: integer }
        evaluated: { type: integer }
        upskillingActive: { type: integer }
        placementsThisQuarter: { type: integer }
        byCountry:
          type: array
          items:
            type: object
            properties:
              country: { type: string }
              count: { type: integer }
              flag: { type: string }
            required: [country, count, flag]
        bySkill:
          type: array
          items:
            type: object
            properties:
              skill: { type: string }
              count: { type: integer }
            required: [skill, count]
        byReadiness:
          type: array
          items:
            type: object
            properties:
              tier: { type: string }
              count: { type: integer }
            required: [tier, count]
        byUpskilling:
          type: array
          items:
            type: object
            properties:
              area: { type: string }
              count: { type: integer }
            required: [area, count]
        monthlyGrowth:
          type: array
          items:
            type: object
            properties:
              month: { type: string }
              registrations: { type: integer }
              evaluations: { type: integer }
            required: [month, registrations, evaluations]
      required:
        - totalCandidates
        - evaluated
        - upskillingActive
        - placementsThisQuarter
        - byCountry
        - bySkill
        - byReadiness
        - byUpskilling
        - monthlyGrowth

    ActivityItem:
      type: object
      properties:
        id: { type: string }
        kind: { type: string, enum: [registration, evaluation, upskilling, placement] }
        candidateName: { type: string }
        country: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
      required: [id, kind, candidateName, country, message, timestamp]

    DemoJourney:
      type: object
      properties:
        candidate: { $ref: "#/components/schemas/Candidate" }
        steps:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              detail: { type: string }
              status: { type: string, enum: [done, active, pending] }
            required: [label, detail, status]
      required: [candidate, steps]

    AssessmentCategory:
      type: string
      enum: [needs_upskilling, needs_reskilling]

    TrainingType:
      type: string
      enum: [upskilling, reskilling]

    TrainingStatus:
      type: string
      enum:
        - not_started
        - in_progress
        - module_completed
        - live_session_pending
        - assessment_pending
        - completed
        - recruiter_ready

    ModuleStatus:
      type: string
      enum: [not_started, in_progress, completed, assessment_pending]

    LiveSessionStatus:
      type: string
      enum: [scheduled, completed, cancelled]

    TrainingModule:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        durationMinutes: { type: integer }
        status: { $ref: "#/components/schemas/ModuleStatus" }
      required: [id, title, durationMinutes, status]

    LiveSession:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        scheduledFor: { type: string, format: date-time }
        trainerName: { type: string }
        status: { $ref: "#/components/schemas/LiveSessionStatus" }
      required: [id, title, scheduledFor, trainerName, status]

    Trainer:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        specialism: { type: string }
        yearsExperience: { type: integer }
        country: { type: string }
      required: [id, name, specialism, yearsExperience, country]

    TrainingProgram:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        trainingType: { $ref: "#/components/schemas/TrainingType" }
        recommendedPath: { type: string }
        deliveryMode: { type: string, enum: [hybrid] }
        durationWeeks: { type: integer }
        moduleTemplates:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              durationMinutes: { type: integer }
            required: [title, durationMinutes]
        focusAreas:
          type: array
          items: { type: string }
      required:
        - id
        - name
        - trainingType
        - recommendedPath
        - deliveryMode
        - durationWeeks
        - moduleTemplates
        - focusAreas

    TrainingCatalog:
      type: object
      properties:
        programs:
          type: array
          items: { $ref: "#/components/schemas/TrainingProgram" }
        trainers:
          type: array
          items: { $ref: "#/components/schemas/Trainer" }
      required: [programs, trainers]

    TrainingAssignment:
      type: object
      properties:
        id: { type: string }
        candidateId: { type: string }
        candidateName: { type: string }
        candidateCountry: { type: string }
        candidateAvatarUrl: { type: string }
        candidateTargetRole: { type: string }
        assessmentCategory: { $ref: "#/components/schemas/AssessmentCategory" }
        trainingType: { $ref: "#/components/schemas/TrainingType" }
        programId: { type: string }
        programName: { type: string }
        recommendedPath: { type: string }
        deliveryMode: { type: string, enum: [hybrid] }
        trainerId: { type: string }
        trainerName: { type: string }
        modules:
          type: array
          items: { $ref: "#/components/schemas/TrainingModule" }
        liveSessions:
          type: array
          items: { $ref: "#/components/schemas/LiveSession" }
        startDate: { type: string, format: date-time }
        targetCompletionDate: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/TrainingStatus" }
        progressPct: { type: integer, minimum: 0, maximum: 100 }
        finalReadinessNote:
          oneOf:
            - { type: string }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - candidateId
        - candidateName
        - candidateCountry
        - candidateAvatarUrl
        - candidateTargetRole
        - assessmentCategory
        - trainingType
        - programId
        - programName
        - recommendedPath
        - deliveryMode
        - trainerId
        - trainerName
        - modules
        - liveSessions
        - startDate
        - targetCompletionDate
        - status
        - progressPct
        - createdAt
        - updatedAt

    TrainingAssignmentCreate:
      type: object
      properties:
        candidateId: { type: string }
        programId: { type: string }
        trainerId: { type: string }
        startDate: { type: string, format: date-time }
        targetCompletionDate: { type: string, format: date-time }
      required: [candidateId, programId, trainerId, startDate, targetCompletionDate]

    TrainingAssignmentUpdate:
      type: object
      properties:
        status: { $ref: "#/components/schemas/TrainingStatus" }
        progressPct: { type: integer, minimum: 0, maximum: 100 }
        moduleId: { type: string }
        moduleStatus: { $ref: "#/components/schemas/ModuleStatus" }
        liveSessionId: { type: string }
        liveSessionStatus: { $ref: "#/components/schemas/LiveSessionStatus" }
        finalReadinessNote: { type: string }

    TrainingRecommendation:
      type: object
      properties:
        candidateId: { type: string }
        assessmentCategory: { $ref: "#/components/schemas/AssessmentCategory" }
        trainingType: { $ref: "#/components/schemas/TrainingType" }
        recommendedPath: { type: string }
        program: { $ref: "#/components/schemas/TrainingProgram" }
        suggestedTrainer: { $ref: "#/components/schemas/Trainer" }
        suggestedStartDate: { type: string, format: date-time }
        suggestedTargetCompletionDate: { type: string, format: date-time }
        rationale: { type: string }
      required:
        - candidateId
        - assessmentCategory
        - trainingType
        - recommendedPath
        - program
        - suggestedTrainer
        - suggestedStartDate
        - suggestedTargetCompletionDate
        - rationale

    TrainingDashboard:
      type: object
      properties:
        totalInTraining: { type: integer }
        upskillingCount: { type: integer }
        reskillingCount: { type: integer }
        completedCount: { type: integer }
        recruiterReadyCount: { type: integer }
        pendingLiveSessions: { type: integer }
        avgProgressPct: { type: integer }
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status: { $ref: "#/components/schemas/TrainingStatus" }
              count: { type: integer }
            required: [status, count]
        trainerAllocation:
          type: array
          items:
            type: object
            properties:
              trainerId: { type: string }
              trainerName: { type: string }
              specialism: { type: string }
              activeAssignments: { type: integer }
              completedAssignments: { type: integer }
            required:
              - trainerId
              - trainerName
              - specialism
              - activeAssignments
              - completedAssignments
        upcomingLiveSessions:
          type: array
          items:
            type: object
            properties:
              assignmentId: { type: string }
              candidateName: { type: string }
              sessionTitle: { type: string }
              trainerName: { type: string }
              scheduledFor: { type: string, format: date-time }
            required:
              - assignmentId
              - candidateName
              - sessionTitle
              - trainerName
              - scheduledFor
      required:
        - totalInTraining
        - upskillingCount
        - reskillingCount
        - completedCount
        - recruiterReadyCount
        - pendingLiveSessions
        - avgProgressPct
        - statusBreakdown
        - trainerAllocation
        - upcomingLiveSessions
