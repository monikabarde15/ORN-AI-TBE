              - candidateName
              - sessionTitle
              - trainerName
              - scheduledFor
      required:
        - totalInTraining
        - upskillingCount
        - reskillingCount
        - completedCount
        - recruiterReadyCount
        - pendingLiveSessions
        - avgProgressPct
        - statusBreakdown
        - trainerAllocation
        - upcomingLiveSessions

