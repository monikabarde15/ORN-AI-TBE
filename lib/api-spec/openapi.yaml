openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ORN-AI Talent Infrastructure Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Candidate registration and lifecycle
  - name: evaluation
    description: AI CV evaluation and scoring
  - name: recruiter
    description: Recruiter dashboard endpoints
  - name: admin
    description: Admin dashboard endpoints
  - name: meta
    description: Reference data (countries, roles, levels)
  - name: training
    description: Career-transformation workflow (Upskilling / Reskilling → Recruiter Ready)
  - name: auth
    description: Authentication and session management
  - name: projects
    description: Real-world capstone projects assigned to candidates
paths:
  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new user account (candidate, recruiter or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Sign out
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get the current authenticated user (or null)
      responses:
        "200":
          description: Current user or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthUser"
                  - type: "null"

  /candidates/{id}/cv-file:
    post:
      operationId: uploadCvFile
      tags: [candidates]
      summary: Upload a real CV file (PDF/DOC/DOCX) and auto-extract profile data
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CvFileUploadRequest"
      responses:
        "200":
          description: Updated candidate with extracted profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CvFileUploadResult"

  /candidates/{id}/cv/full.pdf:
    get:
      operationId: downloadFullCv
      tags: [candidates]
      summary: Download the candidate's transformed full CV as a branded PDF
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /candidates/{id}/cv/masked.pdf:
    get:
      operationId: downloadMaskedCv
      tags: [candidates]
      summary: Download an anonymised, recruiter-shareable PDF (no PII)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /candidates/{id}/shortlist:
    post:
      operationId: shortlistCandidate
      tags: [recruiter]
      summary: Toggle the recruiter shortlist flag on a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortlistRequest"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}/client-ready:
    post:
      operationId: markClientReady
      tags: [recruiter]
      summary: Mark a candidate as client-ready (visible to client portfolios)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientReadyRequest"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}/skill-gap:
    get:
      operationId: getSkillGap
      tags: [evaluation]
      summary: Skill gap analysis for a candidate against their target role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Skill gap result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillGap"

  /candidates/{id}/projects:
    get:
      operationId: listCandidateProjects
      tags: [projects]
      summary: List projects assigned to a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Project" }
    post:
      operationId: assignCandidateProject
      tags: [projects]
      summary: Assign a new capstone project to a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project status, feedback or end date
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /admin/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [admin]
      summary: Recent platform audit log entries
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditLog" }


  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /meta/regions:
    get:
      operationId: listRegions
      tags: [meta]
      summary: List supported countries grouped by phase
      responses:
        "200":
          description: Regions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionList"

  /meta/roles:
    get:
      operationId: listRoles
      tags: [meta]
      summary: List target roles available
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates with filters (recruiter/admin view)
      parameters:
        - name: country
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string }
        - name: experienceMin
          in: query
          schema: { type: integer }
        - name: experienceMax
          in: query
          schema: { type: integer }
        - name: englishLevel
          in: query
          schema: { type: string }
        - name: minReadiness
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

    post:
      operationId: registerCandidate
      tags: [candidates]
      summary: Register a new candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateRegistration"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}/cv:
    post:
      operationId: uploadCv
      tags: [candidates]
      summary: Attach CV metadata to a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CvUpload"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/{id}/evaluation:
    post:
      operationId: runEvaluation
      tags: [evaluation]
      summary: Run AI evaluation against a candidate's CV
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
    get:
      operationId: getEvaluation
      tags: [evaluation]
      summary: Get the latest evaluation for a candidate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"

  /recruiter/summary:
    get:
      operationId: recruiterSummary
      tags: [recruiter]
      summary: Headline metrics for the recruiter dashboard
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterSummary"

  /admin/pipeline:
    get:
      operationId: adminPipeline
      tags: [admin]
      summary: Talent pipeline aggregates by country, skill, readiness, and upskilling
      responses:
        "200":
          description: Pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPipeline"

  /admin/activity:
    get:
      operationId: adminActivity
      tags: [admin]
      summary: Recent platform activity feed
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /demo/seed:
    post:
      operationId: runDemoJourney
      tags: [admin]
      summary: Generate a fresh demo candidate journey for investor presentation
      responses:
        "200":
          description: Demo journey result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoJourney"

  /training/catalog:
    get:
      operationId: listTrainingCatalog
      tags: [training]
      summary: Available training programs and trainers
      responses:
        "200":
          description: Catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingCatalog"

  /training/dashboard:
    get:
      operationId: trainingDashboard
      tags: [training]
      summary: Admin training dashboard aggregates
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDashboard"

  /training/assignments:
    get:
      operationId: listTrainingAssignments
      tags: [training]
      summary: List training assignments (admin view)
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/TrainingStatus" }
        - name: trainingType
          in: query
          schema: { $ref: "#/components/schemas/TrainingType" }
        - name: trainerId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingAssignment"
    post:
      operationId: createTrainingAssignment
      tags: [training]
      summary: Assign a training program to a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingAssignmentCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignment"

  /training/assignments/{id}:
    get:
      operationId: getTrainingAssignment
      tags: [training]
      summary: Get a single training assignment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignment"
    patch:
      operationId: updateTrainingAssignment
      tags: [training]
      summary: Update training progress / status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingAssignmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignment"

  /candidates/{id}/training:
    get:
      operationId: getCandidateTraining
      tags: [training]
      summary: Get the active training assignment for a candidate (or null)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Training assignment or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TrainingAssignment"
                  - type: "null"

  /training/recommend/{candidateId}:
    get:
      operationId: recommendTrainingForCandidate
      tags: [training]
      summary: Suggest a recommended program for a candidate based on their evaluation
      parameters:
        - name: candidateId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingRecommendation"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Region:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        phase: { type: integer }
        flag: { type: string }
      required: [code, name, phase, flag]

    RegionList:
      type: object
      properties:
        phase1:
          type: array
          items: { $ref: "#/components/schemas/Region" }
        phase2:
          type: array
          items: { $ref: "#/components/schemas/Region" }
      required: [phase1, phase2]

    EnglishLevel:
      type: string
      enum: [A1, A2, B1, B2, C1, C2]

    VisaStatus:
      type: string
      enum: [eu_citizen, work_permit, blue_card, requires_sponsorship, student_visa]

    CandidateRegistration:
      type: object
      properties:
        fullName: { type: string, minLength: 2 }
        email: { type: string, format: email }
        phone: { type: string }
        country: { type: string }
        targetRole: { type: string }
        yearsExperience: { type: integer, minimum: 0, maximum: 50 }
        visaStatus: { $ref: "#/components/schemas/VisaStatus" }
        englishLevel: { $ref: "#/components/schemas/EnglishLevel" }
        euWorkEligible: { type: boolean }
        linkedinUrl: { type: string }
        skills:
          type: array
          items: { type: string }
      required:
        - fullName
        - email
        - phone
        - country
        - targetRole
        - yearsExperience
        - visaStatus
        - englishLevel
        - euWorkEligible
        - linkedinUrl

    CvUpload:
      type: object
      properties:
        fileName: { type: string }
        fileSize: { type: integer }
        contentSummary: { type: string }
      required: [fileName, fileSize]

    EvaluationScores:
      type: object
      properties:
        cvQuality: { type: integer, minimum: 0, maximum: 100 }
        technicalSkillMatch: { type: integer, minimum: 0, maximum: 100 }
        technicalRelevance: { type: integer, minimum: 0, maximum: 100 }
        englishReadiness: { type: integer, minimum: 0, maximum: 100 }
        europeJobReadiness: { type: integer, minimum: 0, maximum: 100 }
        marketReadiness: { type: integer, minimum: 0, maximum: 100 }
        careerGapRisk: { type: integer, minimum: 0, maximum: 100 }
        upskillingNeeds: { type: integer, minimum: 0, maximum: 100 }
        overall: { type: integer, minimum: 0, maximum: 100 }
      required:
        - cvQuality
        - technicalSkillMatch
        - technicalRelevance
        - englishReadiness
        - europeJobReadiness
        - marketReadiness
        - careerGapRisk
        - upskillingNeeds
        - overall

    CandidateClassification:
      type: string
      enum: [recruiter_ready, needs_upskilling, needs_reskilling, not_ready_yet]

    SkillGap:
      type: object
      properties:
        targetRole: { type: string }
        required:
          type: array
          items: { type: string }
        matched:
          type: array
          items: { type: string }
        missing:
          type: array
          items: { type: string }
        matchPct: { type: integer, minimum: 0, maximum: 100 }
      required: [targetRole, required, matched, missing, matchPct]

    EvaluationInsight:
      type: object
      properties:
        title: { type: string }
        detail: { type: string }
        severity: { type: string, enum: [strength, opportunity, gap] }
      required: [title, detail, severity]

    Evaluation:
      type: object
      properties:
        candidateId: { type: string }
        evaluatedAt: { type: string, format: date-time }
        scores: { $ref: "#/components/schemas/EvaluationScores" }
        strengths:
          type: array
          items: { type: string }
        gaps:
          type: array
          items: { type: string }
        recommendedUpskilling:
          type: array
          items: { type: string }
        insights:
          type: array
          items: { $ref: "#/components/schemas/EvaluationInsight" }
        readinessTier: { type: string, enum: [emerging, developing, ready, elite] }
        classification: { $ref: "#/components/schemas/CandidateClassification" }
        skillGap: { $ref: "#/components/schemas/SkillGap" }
      required:
        - candidateId
        - evaluatedAt
        - scores
        - strengths
        - gaps
        - recommendedUpskilling
        - insights
        - readinessTier
        - classification
        - skillGap

    Candidate:
      type: object
      properties:
        id: { type: string }
        fullName: { type: string }
        email: { type: string }
        phone: { type: string }
        country: { type: string }
        targetRole: { type: string }
        yearsExperience: { type: integer }
        visaStatus: { $ref: "#/components/schemas/VisaStatus" }
        englishLevel: { $ref: "#/components/schemas/EnglishLevel" }
        euWorkEligible: { type: boolean }
        linkedinUrl: { type: string }
        createdAt: { type: string, format: date-time }
        cv:
          oneOf:
            - $ref: "#/components/schemas/CvUpload"
            - type: "null"
        evaluation:
          oneOf:
            - $ref: "#/components/schemas/Evaluation"
            - type: "null"
        skills:
          type: array
          items: { type: string }
        avatarUrl: { type: string }
        source: { type: string, enum: [direct, recruiter] }
        lastRole:
          oneOf:
            - { type: string }
            - { type: "null" }
        domain:
          oneOf:
            - { type: string }
            - { type: "null" }
        careerGapMonths: { type: integer, minimum: 0 }
        isShortlisted: { type: boolean }
        isClientReady: { type: boolean }
        isIndustryReady: { type: boolean }
        hasCvFile: { type: boolean }
      required:
        - id
        - fullName
        - email
        - phone
        - country
        - targetRole
        - yearsExperience
        - visaStatus
        - englishLevel
        - euWorkEligible
        - linkedinUrl
        - createdAt
        - skills
        - avatarUrl
        - source
        - careerGapMonths
        - isShortlisted
        - isClientReady
        - isIndustryReady
        - hasCvFile

    RecruiterSummary:
      type: object
      properties:
        totalCandidates: { type: integer }
        readyCandidates: { type: integer }
        newThisWeek: { type: integer }
        avgReadiness: { type: integer }
        countryBreakdown:
          type: array
          items:
            type: object
            properties:
              country: { type: string }
              count: { type: integer }
              avgReadiness: { type: integer }
            required: [country, count, avgReadiness]
        topRoles:
          type: array
          items:
            type: object
            properties:
              role: { type: string }
              count: { type: integer }
            required: [role, count]
      required:
        - totalCandidates
        - readyCandidates
        - newThisWeek
        - avgReadiness
        - countryBreakdown
        - topRoles

    AdminPipeline:
      type: object
      properties:
        totalCandidates: { type: integer }
        evaluated: { type: integer }
        upskillingActive: { type: integer }
        placementsThisQuarter: { type: integer }
        byCountry:
          type: array
          items:
            type: object
            properties:
              country: { type: string }
              count: { type: integer }
              flag: { type: string }
            required: [country, count, flag]
        bySkill:
          type: array
          items:
            type: object
            properties:
              skill: { type: string }
              count: { type: integer }
            required: [skill, count]
        byReadiness:
          type: array
          items:
            type: object
            properties:
              tier: { type: string }
              count: { type: integer }
            required: [tier, count]
        byUpskilling:
          type: array
          items:
            type: object
            properties:
              area: { type: string }
              count: { type: integer }
            required: [area, count]
        monthlyGrowth:
          type: array
          items:
            type: object
            properties:
              month: { type: string }
              registrations: { type: integer }
              evaluations: { type: integer }
            required: [month, registrations, evaluations]
      required:
        - totalCandidates
        - evaluated
        - upskillingActive
        - placementsThisQuarter
        - byCountry
        - bySkill
        - byReadiness
        - byUpskilling
        - monthlyGrowth

    ActivityItem:
      type: object
      properties:
        id: { type: string }
        kind: { type: string, enum: [registration, evaluation, upskilling, placement] }
        candidateName: { type: string }
        country: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
      required: [id, kind, candidateName, country, message, timestamp]

    DemoJourney:
      type: object
      properties:
        candidate: { $ref: "#/components/schemas/Candidate" }
        steps:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              detail: { type: string }
              status: { type: string, enum: [done, active, pending] }
            required: [label, detail, status]
      required: [candidate, steps]

    AssessmentCategory:
      type: string
      enum: [needs_upskilling, needs_reskilling]

    TrainingType:
      type: string
      enum: [upskilling, reskilling]

    TrainingStatus:
      type: string
      enum:
        - not_started
        - in_progress
        - module_completed
        - live_session_pending
        - assessment_pending
        - completed
        - recruiter_ready

    ModuleStatus:
      type: string
      enum: [not_started, in_progress, completed, assessment_pending]

    LiveSessionStatus:
      type: string
      enum: [scheduled, completed, cancelled]

    TrainingModule:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
