        - trainingType
        - recommendedPath
        - program
        - suggestedTrainer
        - suggestedStartDate
        - suggestedTargetCompletionDate
        - rationale

    TrainingDashboard:
      type: object
      properties:
        totalInTraining: { type: integer }
        upskillingCount: { type: integer }
        reskillingCount: { type: integer }
        completedCount: { type: integer }
        recruiterReadyCount: { type: integer }
        pendingLiveSessions: { type: integer }
        avgProgressPct: { type: integer }
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status: { $ref: "#/components/schemas/TrainingStatus" }
              count: { type: integer }
            required: [status, count]
        trainerAllocation:
          type: array
          items:
            type: object
            properties:
