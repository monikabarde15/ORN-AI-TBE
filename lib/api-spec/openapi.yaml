        yearsExperience: { type: integer }
        country: { type: string }
      required: [id, name, specialism, yearsExperience, country]

    TrainingProgram:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        trainingType: { $ref: "#/components/schemas/TrainingType" }
        recommendedPath: { type: string }
        deliveryMode: { type: string, enum: [hybrid] }
        durationWeeks: { type: integer }
        moduleTemplates:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              durationMinutes: { type: integer }
            required: [title, durationMinutes]
        focusAreas:
          type: array
          items: { type: string }
      required:
        - id
        - name
        - trainingType
        - recommendedPath
        - deliveryMode
        - durationWeeks
        - moduleTemplates
        - focusAreas

    TrainingCatalog:
      type: object
      properties:
        programs:
          type: array
          items: { $ref: "#/components/schemas/TrainingProgram" }
        trainers:
          type: array
          items: { $ref: "#/components/schemas/Trainer" }
      required: [programs, trainers]

    TrainingAssignment:
      type: object
      properties:
        id: { type: string }
        candidateId: { type: string }
        candidateName: { type: string }
        candidateCountry: { type: string }
        candidateAvatarUrl: { type: string }
        candidateTargetRole: { type: string }
        assessmentCategory: { $ref: "#/components/schemas/AssessmentCategory" }
        trainingType: { $ref: "#/components/schemas/TrainingType" }
        programId: { type: string }
        programName: { type: string }
        recommendedPath: { type: string }
        deliveryMode: { type: string, enum: [hybrid] }
        trainerId: { type: string }
        trainerName: { type: string }
        modules:
          type: array
          items: { $ref: "#/components/schemas/TrainingModule" }
        liveSessions:
          type: array
          items: { $ref: "#/components/schemas/LiveSession" }
        startDate: { type: string, format: date-time }
        targetCompletionDate: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/TrainingStatus" }
        progressPct: { type: integer, minimum: 0, maximum: 100 }
        finalReadinessNote:
          oneOf:
            - { type: string }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - candidateId
        - candidateName
        - candidateCountry
        - candidateAvatarUrl
        - candidateTargetRole
        - assessmentCategory
        - trainingType
        - programId
        - programName
        - recommendedPath
        - deliveryMode
        - trainerId
        - trainerName
        - modules
        - liveSessions
        - startDate
        - targetCompletionDate
        - status
        - progressPct
        - createdAt
        - updatedAt

    TrainingAssignmentCreate:
      type: object
      properties:
        candidateId: { type: string }
        programId: { type: string }
        trainerId: { type: string }
        startDate: { type: string, format: date-time }
        targetCompletionDate: { type: string, format: date-time }
      required: [candidateId, programId, trainerId, startDate, targetCompletionDate]

    TrainingAssignmentUpdate:
      type: object
      properties:
        status: { $ref: "#/components/schemas/TrainingStatus" }
        progressPct: { type: integer, minimum: 0, maximum: 100 }
        moduleId: { type: string }
        moduleStatus: { $ref: "#/components/schemas/ModuleStatus" }
        liveSessionId: { type: string }
        liveSessionStatus: { $ref: "#/components/schemas/LiveSessionStatus" }
        finalReadinessNote: { type: string }

    TrainingRecommendation:
      type: object
      properties:
        candidateId: { type: string }
        assessmentCategory: { $ref: "#/components/schemas/AssessmentCategory" }
        trainingType: { $ref: "#/components/schemas/TrainingType" }
        recommendedPath: { type: string }
        program: { $ref: "#/components/schemas/TrainingProgram" }
        suggestedTrainer: { $ref: "#/components/schemas/Trainer" }
        suggestedStartDate: { type: string, format: date-time }
        suggestedTargetCompletionDate: { type: string, format: date-time }
        rationale: { type: string }
      required:
        - candidateId
